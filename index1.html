<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Retro Queens</title>
  <style>
    :root{
      --bg:#342a45;
      --panel:#f6d36b;
      --ink:#26212c;
      --cream:#fff7df;
      --orange:#e98a3a;
      --bad:#b73535;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #584673, var(--bg));
      color:var(--cream);
      display:flex;
      justify-content:center;
      padding:14px;
    }
    .app{width:min(96vw,720px)}
    header{text-align:center;margin-bottom:12px}
    h1{
      margin:6px 0 4px;
      font-size:clamp(2rem,8vw,4rem);
      letter-spacing:.04em;
      color:var(--panel);
      text-shadow:4px 4px 0 var(--orange);
    }
    .subtitle{margin:0;color:#ffeeb6}
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      background:rgba(255,255,255,.09);
      padding:12px;
      border-radius:18px;
      margin-bottom:10px;
    }
    button, select{
      border:0;
      border-radius:999px;
      padding:11px 14px;
      font-weight:800;
      background:var(--panel);
      color:var(--ink);
      box-shadow:0 4px 0 var(--orange);
      font-size:1rem;
    }
    button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange)}
    #status{
      min-height:28px;
      text-align:center;
      font-weight:800;
      margin:8px 0 10px;
      color:#ffeeb6;
    }
    .board-wrap{
      background:var(--cream);
      border:8px solid var(--panel);
      border-radius:20px;
      padding:8px;
      box-shadow:0 10px 0 rgba(0,0,0,.25);
      overflow:auto;
      touch-action:manipulation;
    }
    #board{
      display:grid;
      gap:3px;
      margin:auto;
      width:min(91vw,650px);
      aspect-ratio:1;
    }
    .cell{
      border:0;
      border-radius:8px;
      box-shadow:none;
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(1rem,6vw,2rem);
      cursor:pointer;
      position:relative;
      min-width:26px;
      min-height:26px;
      background:#ddd;
      color:var(--ink);
      line-height:1;
    }
    .cell.x::after{
      content:"×";
      font-size:1.35em;
      font-weight:900;
      color:rgba(38,33,44,.72);
    }
    .cell.auto-x::after{
      content:"×";
      font-size:1.35em;
      font-weight:900;
      color:rgba(38,33,44,.42);
    }
    .cell.queen::after{
      content:"♛";
      font-size:1.25em;
      color:var(--ink);
      filter: drop-shadow(1px 2px 0 rgba(255,255,255,.42));
    }
    .cell.bad{
      outline:4px solid var(--bad);
      z-index:1;
    }
    .rules{
      margin-top:14px;
      background:rgba(255,255,255,.09);
      padding:13px 15px;
      border-radius:16px;
      line-height:1.45;
    }
    .rules strong{color:var(--panel)}
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Retro Queens</h1>
      <p class="subtitle">Tap once for X, twice for queen.</p>
    </header>

    <section class="controls">
      <select id="difficulty" aria-label="Difficulty">
        <option value="easy">Easy 6 × 6</option>
        <option value="medium" selected>Medium 8 × 8</option>
        <option value="hard">Hard 10 × 10</option>
      </select>
      <button id="newGame">New game</button>
      <button id="check">Check</button>
      <button id="clear">Clear</button>
    </section>

    <div id="status">Tap a square once for X, twice for queen.</div>
    <section class="board-wrap">
      <div id="board" aria-label="Queens game board"></div>
    </section>

    <section class="rules">
      <strong>Rules:</strong> place one queen in every row, every column and every colour zone.
      Queens must not touch each other, even diagonally. When you place a queen, impossible squares are crossed out automatically.
    </section>
  </main>

  <script>
    const palettes = [
      "#f8dc83","#f5b47b","#8fd3d0","#eba1b6","#bad496",
      "#c6a7e8","#f3a895","#98c5df","#e5cf88","#b7d9a9"
    ];

    const settings = { easy: 6, medium: 8, hard: 10 };

    let size = 8;
    let solution = [];
    let zones = [];
    let marks = new Map(); // 0 = empty, 1 = manual X, 2 = queen

    const board = document.getElementById("board");
    const status = document.getElementById("status");
    const difficulty = document.getElementById("difficulty");

    function key(r,c){ return `${r},${c}`; }
    function getMark(r,c){ return marks.get(key(r,c)) || 0; }

    function shuffle(array){
      const a = array.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function generateSolution(n){
      const cols = shuffle([...Array(n).keys()]);
      const placed = [];
      function canPlace(r,c){
        for(const [rr,cc] of placed){
          if(cc === c) return false;
          if(Math.abs(rr-r) <= 1 && Math.abs(cc-c) <= 1) return false;
        }
        return true;
      }
      function solve(r){
        if(r === n) return true;
        for(const c of shuffle(cols)){
          if(canPlace(r,c)){
            placed.push([r,c]);
            if(solve(r+1)) return true;
            placed.pop();
          }
        }
        return false;
      }
      if(solve(0)) return placed;
      return generateSolution(n);
    }

    function makeZones(n, sol){
      const zoneGrid = Array.from({length:n},()=>Array(n).fill(-1));
      const frontier = [];
      sol.forEach(([r,c],i)=>{
        zoneGrid[r][c] = i;
        frontier.push([r,c,i]);
      });

      let remaining = n*n - n;
      while(remaining > 0){
        const [r,c,z] = frontier[Math.floor(Math.random()*frontier.length)];
        const neighbours = shuffle([[1,0],[-1,0],[0,1],[0,-1]]);
        let added = false;
        for(const [dr,dc] of neighbours){
          const nr = r+dr, nc = c+dc;
          if(nr>=0 && nr<n && nc>=0 && nc<n && zoneGrid[nr][nc] === -1){
            zoneGrid[nr][nc] = z;
            frontier.push([nr,nc,z]);
            remaining--;
            added = true;
            break;
          }
        }
        if(!added){
          const open = [];
          for(let rr=0;rr<n;rr++){
            for(let cc=0;cc<n;cc++){
              if(zoneGrid[rr][cc] !== -1){
                for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
                  const nr=rr+dr,nc=cc+dc;
                  if(nr>=0&&nr<n&&nc>=0&&nc<n&&zoneGrid[nr][nc]===-1) open.push([rr,cc,zoneGrid[rr][cc]]);
                }
              }
            }
          }
          if(open.length) frontier.push(open[Math.floor(Math.random()*open.length)]);
        }
      }
      return zoneGrid;
    }

    function queenCells(){
      return [...marks.entries()]
        .filter(([,v]) => v === 2)
        .map(([k]) => k.split(",").map(Number));
    }

    function autoEliminated(){
      const auto = new Set();
      for(const [r,c] of queenCells()){
        const queenZone = zones[r][c];

        for(let i=0;i<size;i++){
          if(i !== c) auto.add(key(r,i)); // same row
          if(i !== r) auto.add(key(i,c)); // same column
        }

        for(let rr=0;rr<size;rr++){
          for(let cc=0;cc<size;cc++){
            if(!(rr === r && cc === c) && zones[rr][cc] === queenZone){
              auto.add(key(rr,cc));
            }
          }
        }

        for(let dr=-1;dr<=1;dr++){
          for(let dc=-1;dc<=1;dc++){
            if(dr === 0 && dc === 0) continue;
            const nr = r+dr, nc = c+dc;
            if(nr>=0 && nr<size && nc>=0 && nc<size) auto.add(key(nr,nc));
          }
        }
      }

      for(const [r,c] of queenCells()) auto.delete(key(r,c));
      return auto;
    }

    function newGame(){
      size = settings[difficulty.value];
      marks.clear();
      solution = generateSolution(size);
      zones = makeZones(size, solution);
      render();
      status.textContent = "Tap a square once for X, twice for queen.";
    }

    function render(){
      const auto = autoEliminated();
      const bad = conflicts();

      board.innerHTML = "";
      board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

      for(let r=0;r<size;r++){
        for(let c=0;c<size;c++){
          const cell = document.createElement("button");
          cell.className = "cell";
          cell.style.background = palettes[zones[r][c] % palettes.length];
          cell.setAttribute("aria-label", `row ${r+1}, column ${c+1}`);

          const k = key(r,c);
          const mark = getMark(r,c);

          if(mark === 2) cell.classList.add("queen");
          else if(mark === 1) cell.classList.add("x");
          else if(auto.has(k)) cell.classList.add("auto-x");

          if(bad.has(k)) cell.classList.add("bad");

          cell.addEventListener("click",()=>{
            const current = getMark(r,c);
            const next = current === 0 ? 1 : current === 1 ? 2 : 0;
            if(next === 0) marks.delete(k);
            else marks.set(k,next);
            render();
            updateStatus();
          });

          board.appendChild(cell);
        }
      }
    }

    function conflicts(){
      const cells = queenCells();
      const bad = new Set();
      const rows = new Map(), cols = new Map(), zoneMap = new Map();

      function add(map, label, pos){
        if(!map.has(label)) map.set(label, []);
        map.get(label).push(pos);
      }

      cells.forEach(([r,c])=>{
        add(rows,r,[r,c]);
        add(cols,c,[r,c]);
        add(zoneMap,zones[r][c],[r,c]);
      });

      for(const map of [rows, cols, zoneMap]){
        for(const group of map.values()){
          if(group.length > 1) group.forEach(([r,c])=>bad.add(key(r,c)));
        }
      }

      for(let i=0;i<cells.length;i++){
        for(let j=i+1;j<cells.length;j++){
          const [r1,c1] = cells[i], [r2,c2] = cells[j];
          if(Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1){
            bad.add(key(r1,c1)); bad.add(key(r2,c2));
          }
        }
      }
      return bad;
    }

    function updateStatus(){
      const q = queenCells().length;
      const bad = conflicts();
      if(bad.size) status.textContent = "There is a queen clash.";
      else status.textContent = `${q}/${size} queens placed.`;
    }

    function checkWin(){
      const bad = conflicts();
      const q = queenCells().length;
      render();

      if(bad.size){
        status.textContent = "Not quite — at least one queen clashes.";
        return;
      }
      if(q !== size){
        status.textContent = `You need ${size} queens.`;
        return;
      }

      const rows = new Set(), cols = new Set(), zoneSet = new Set();
      for(const [r,c] of queenCells()){
        rows.add(r); cols.add(c); zoneSet.add(zones[r][c]);
      }
      if(rows.size === size && cols.size === size && zoneSet.size === size){
        status.textContent = "Groovy! Puzzle solved.";
      } else {
        status.textContent = "Not quite — check rows, columns and colour zones.";
      }
    }

    document.getElementById("newGame").addEventListener("click", newGame);
    document.getElementById("clear").addEventListener("click", ()=>{
      marks.clear();
      render();
      status.textContent = "Board cleared.";
    });
    document.getElementById("check").addEventListener("click", checkWin);
    difficulty.addEventListener("change", newGame);

    newGame();
  </script>
</body>
</html>
