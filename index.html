<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Retro Queens</title>
<style>
:root{--bg:#342a45;--panel:#f6d36b;--ink:#241f2d;--cream:#fff7df;--orange:#e98a3a;--bad:#b73535;--win:#fff06a}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#584673,var(--bg));color:var(--cream);display:flex;justify-content:center;padding:12px}
.app{width:min(96vw,740px)}
header{text-align:center;margin-bottom:10px}
h1{margin:4px 0;font-size:clamp(2rem,8vw,4rem);letter-spacing:.04em;color:var(--panel);text-shadow:4px 4px 0 var(--orange)}
.subtitle{margin:0;color:#ffeeb6}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,.09);padding:12px;border-radius:18px;margin-bottom:8px}
button,select{border:0;border-radius:999px;padding:11px 14px;font-weight:800;background:var(--panel);color:var(--ink);box-shadow:0 4px 0 var(--orange);font-size:1rem}
button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange)}
#status{min-height:28px;text-align:center;font-weight:800;margin:8px 0 10px;color:#ffeeb6}
.board-wrap{background:var(--cream);border:8px solid var(--panel);border-radius:20px;padding:8px;box-shadow:0 10px 0 rgba(0,0,0,.25);overflow:auto;touch-action:manipulation}
#board{display:grid;gap:3px;margin:auto;width:min(91vw,650px);aspect-ratio:1}
.cell{border:0;border-radius:8px;box-shadow:none;padding:0;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,6vw,2rem);cursor:pointer;position:relative;min-width:26px;min-height:26px;color:var(--ink);line-height:1}
.cell.x::after{content:"×";font-size:1.35em;font-weight:900;color:rgba(36,31,45,.72)}
.cell.auto-x::after{content:"×";font-size:1.35em;font-weight:900;color:rgba(36,31,45,.38)}
.cell.queen::after{content:"♛";font-size:1.25em;color:var(--ink);filter:drop-shadow(1px 2px 0 rgba(255,255,255,.42))}
.cell.bad{outline:4px solid var(--bad);z-index:1}
.cell.winQueen::after{animation:queenPulse .55s ease-in-out infinite alternate;color:#7b1fa2;font-size:1.75em}
@keyframes queenPulse{from{transform:scale(1);filter:drop-shadow(0 0 0 var(--win))}to{transform:scale(1.35);filter:drop-shadow(0 0 10px var(--win))}}
.rules{margin-top:14px;background:rgba(255,255,255,.09);padding:13px 15px;border-radius:16px;line-height:1.45}
.rules strong{color:var(--panel)}
</style>
</head>
<body>
<main class="app">
<header><h1>Retro Queens</h1><p class="subtitle">Tap once for X, twice for queen.</p></header>
<section class="controls">
<select id="difficulty"><option value="easy">Easy 6 × 6</option><option value="medium" selected>Medium 8 × 8</option><option value="hard">Hard 10 × 10</option></select>
<button id="newGame">New game</button><button id="undo">Undo</button><button id="check">Check</button><button id="clear">Clear marks</button>
</section>
<div id="status">Building puzzle…</div>
<section class="board-wrap"><div id="board"></div></section>
<section class="rules"><strong>Rules:</strong> one queen in every row, every column and every colour region. Queens must not touch, including diagonally. They do not attack along full diagonals.</section>
</main>
<script>
const palettes=["#f8dc83","#f5b47b","#8fd3d0","#eba1b6","#bad496","#c6a7e8","#f3a895","#98c5df","#e5cf88","#b7d9a9"];
const settings={easy:6,medium:8,hard:10};
let size=8,zones=[],solution=[],marks=new Map(),history=[],won=false;
const board=document.getElementById("board"),status=document.getElementById("status"),difficulty=document.getElementById("difficulty");
const key=(r,c)=>`${r},${c}`, mark=(r,c)=>marks.get(key(r,c))||0;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pushHistory(){history.push(new Map(marks)); if(history.length>80)history.shift()}
function genSolution(n){
  const placed=[];
  function ok(r,c){return !placed.some(([rr,cc])=>cc===c||(Math.abs(rr-r)<=1&&Math.abs(cc-c)<=1))}
  function solve(r){if(r===n)return true;for(const c of shuffle([...Array(n).keys()])){if(ok(r,c)){placed.push([r,c]);if(solve(r+1))return true;placed.pop()}}return false}
  return solve(0)?placed:genSolution(n);
}
function makeBalancedZones(n,sol){
  const z=Array.from({length:n},()=>Array(n).fill(-1));
  const front=[];
  sol.forEach(([r,c],i)=>{z[r][c]=i;front.push([r,c,i])});
  let left=n*n-n, guard=0;
  while(left>0 && guard++<25000){
    front.sort((a,b)=>zoneSize(z,a[2])-zoneSize(z,b[2]));
    const choice=front.slice(0,Math.max(2,Math.ceil(front.length*.4)));
    const [r,c,zi]=choice[Math.floor(Math.random()*choice.length)];
    let added=false;
    for(const [dr,dc] of shuffle([[1,0],[-1,0],[0,1],[0,-1]])){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<n&&nc>=0&&nc<n&&z[nr][nc]<0){
        z[nr][nc]=zi;front.push([nr,nc,zi]);left--;added=true;break;
      }
    }
    if(!added){
      for(let rr=0;rr<n;rr++)for(let cc=0;cc<n;cc++)if(z[rr][cc]>=0){
        for(const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nr=rr+dr,nc=cc+dc;if(nr>=0&&nr<n&&nc>=0&&nc<n&&z[nr][nc]<0)front.push([rr,cc,z[rr][cc]]);
        }
      }
    }
  }
  return z;
}
function zoneSize(z,zi){let s=0;for(let r=0;r<z.length;r++)for(let c=0;c<z.length;c++)if(z[r][c]===zi)s++;return s}
function zoneSizes(z,n){let a=Array(n).fill(0);for(let r=0;r<n;r++)for(let c=0;c<n;c++)a[z[r][c]]++;return a}
function countSolutions(n,z,limit=2){
  let count=0, placed=[];
  const rowsUsed=new Set(), colsUsed=new Set(), zonesUsed=new Set();
  const rows=[...Array(n).keys()].sort((a,b)=>rowCand(a).length-rowCand(b).length);
  function rowCand(r){let a=[];for(let c=0;c<n;c++)a.push(c);return a}
  function ok(r,c){
    if(rowsUsed.has(r)||colsUsed.has(c)||zonesUsed.has(z[r][c]))return false;
    return !placed.some(([rr,cc])=>Math.abs(rr-r)<=1&&Math.abs(cc-c)<=1);
  }
  function solve(idx){
    if(count>=limit)return;
    if(idx===n){count++;return}
    const r=rows[idx];
    for(const c of shuffle([...Array(n).keys()])){
      if(ok(r,c)){
        placed.push([r,c]);rowsUsed.add(r);colsUsed.add(c);zonesUsed.add(z[r][c]);
        solve(idx+1);
        placed.pop();rowsUsed.delete(r);colsUsed.delete(c);zonesUsed.delete(z[r][c]);
      }
    }
  }
  solve(0);return count;
}
function hasOpeningMove(n,z){
  const sizes=zoneSizes(z,n);
  if(sizes.some(s=>s<2)) return false; // no single-square gimmicks now
  // A basic non-trivial opening exists if one row/column/region has only one legal candidate after applying no-touch constraints from forced implications.
  // For now, accept unique-solution balanced boards; user deduction will come from row/column/region interactions.
  return true;
}
function buildPuzzle(){
  size=settings[difficulty.value];marks.clear();history=[];won=false;status.textContent="Building puzzle…";
  let tries=0, sol, z, unique=false;
  const maxTries=difficulty.value==="hard"?700:400;
  do{
    sol=genSolution(size); z=makeBalancedZones(size,sol); tries++;
    const sizes=zoneSizes(z,size);
    if(sizes.every(s=>s>=2) && sizes.every(s=>s<=Math.ceil(size*size/size)+3)){
      unique=countSolutions(size,z,2)===1;
    }
  }while(!unique && tries<maxTries);
  solution=sol; zones=z; render();
  status.textContent=unique?"Puzzle ready — unique solution, no single-square regions.":"Puzzle ready — unique solution not guaranteed.";
}
function queens(){return [...marks.entries()].filter(([,v])=>v===2).map(([k])=>k.split(",").map(Number))}
function autoX(){
  const a=new Set();
  for(const [r,c] of queens()){
    for(let i=0;i<size;i++){if(i!==c)a.add(key(r,i));if(i!==r)a.add(key(i,c))}
    for(let rr=0;rr<size;rr++)for(let cc=0;cc<size;cc++)if(!(rr===r&&cc===c)&&zones[rr][cc]===zones[r][c])a.add(key(rr,cc));
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(dr||dc){let nr=r+dr,nc=c+dc;if(nr>=0&&nr<size&&nc>=0&&nc<size)a.add(key(nr,nc))}}
  }
  queens().forEach(([r,c])=>a.delete(key(r,c)));return a;
}
function conflicts(){
  const q=queens(),bad=new Set(),seen=(label,arr)=>{let m=new Map();arr.forEach(([r,c])=>{let v=label(r,c);if(!m.has(v))m.set(v,[]);m.get(v).push([r,c])});for(const g of m.values())if(g.length>1)g.forEach(([r,c])=>bad.add(key(r,c)))};
  seen((r,c)=>r,q);seen((r,c)=>c,q);seen((r,c)=>zones[r][c],q);
  for(let i=0;i<q.length;i++)for(let j=i+1;j<q.length;j++){let [r1,c1]=q[i],[r2,c2]=q[j];if(Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1){bad.add(key(r1,c1));bad.add(key(r2,c2))}}
  return bad;
}
function isSolved(){
  const b=conflicts(),q=queens();if(b.size||q.length!==size)return false;
  return new Set(q.map(x=>x[0])).size===size && new Set(q.map(x=>x[1])).size===size && new Set(q.map(([r,c])=>zones[r][c])).size===size;
}
function render(){
  const ax=autoX(),bad=conflicts();board.innerHTML="";board.style.gridTemplateColumns=`repeat(${size},1fr)`;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    const cell=document.createElement("button"),k=key(r,c),m=mark(r,c);
    cell.className="cell";cell.style.background=palettes[zones[r][c]%palettes.length];
    if(m===2)cell.classList.add("queen");else if(m===1)cell.classList.add("x");else if(ax.has(k))cell.classList.add("auto-x");
    if(bad.has(k))cell.classList.add("bad"); if(won&&m===2)cell.classList.add("winQueen");
    cell.onclick=()=>{if(won)return;pushHistory();let cur=mark(r,c),next=cur===0?1:cur===1?2:0;if(next===0)marks.delete(k);else marks.set(k,next);render();updateStatus();};
    board.appendChild(cell);
  }
}
function updateStatus(){
  if(isSolved()){won=true;status.textContent="Groovy! Puzzle solved.";render();return}
  const b=conflicts(),q=queens().length;status.textContent=b.size?"There is a queen clash.":`${q}/${size} queens placed.`;
}
function checkWin(){
  updateStatus();
  if(!won&&conflicts().size===0)status.textContent=queens().length===size?"Not quite — check colour regions.":`You need ${size} queens.`;
}
document.getElementById("newGame").onclick=buildPuzzle;
document.getElementById("undo").onclick=()=>{if(history.length){marks=history.pop();won=false;render();updateStatus();}else status.textContent="Nothing to undo."};
document.getElementById("clear").onclick=()=>{pushHistory();marks.clear();won=false;render();status.textContent="Board cleared."};
document.getElementById("check").onclick=checkWin;
difficulty.onchange=buildPuzzle;
buildPuzzle();
</script>
</body>
</html>
