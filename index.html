<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Retro Queens</title>
<style>
:root{
  --bg:#342a45;--panel:#f6d36b;--ink:#241f2d;--cream:#fff7df;
  --orange:#e98a3a;--bad:#b73535;--win:#fff06a
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  background:radial-gradient(circle at top,#584673,var(--bg));
  color:var(--cream);display:flex;justify-content:center;padding:12px
}
.app{width:min(96vw,740px)}
header{text-align:center;margin-bottom:10px}
h1{
  margin:4px 0;font-size:clamp(2rem,8vw,4rem);letter-spacing:.04em;
  color:var(--panel);text-shadow:4px 4px 0 var(--orange)
}
.subtitle{margin:0;color:#ffeeb6}
.controls{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  background:rgba(255,255,255,.09);padding:12px;border-radius:18px;margin-bottom:8px
}
button,select{
  border:0;border-radius:999px;padding:11px 14px;font-weight:800;
  background:var(--panel);color:var(--ink);box-shadow:0 4px 0 var(--orange);font-size:1rem
}
button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--orange)}
#status{
  min-height:28px;text-align:center;font-weight:800;margin:8px 0 10px;color:#ffeeb6
}
.board-wrap{
  background:var(--cream);border:8px solid var(--panel);border-radius:20px;padding:8px;
  box-shadow:0 10px 0 rgba(0,0,0,.25);overflow:auto;touch-action:manipulation
}
#board{
  display:grid;gap:3px;margin:auto;width:min(91vw,650px);aspect-ratio:1
}
.cell{
  border:0;border-radius:8px;box-shadow:none;padding:0;display:flex;align-items:center;
  justify-content:center;font-size:clamp(1rem,6vw,2rem);cursor:pointer;position:relative;
  min-width:26px;min-height:26px;color:var(--ink);line-height:1
}
.cell.x::after{
  content:"×";font-size:1.35em;font-weight:900;color:rgba(36,31,45,.72)
}
.cell.auto-x::after{
  content:"×";font-size:1.35em;font-weight:900;color:rgba(36,31,45,.38)
}
.cell.queen::after{
  content:"♛";font-size:1.25em;color:var(--ink);filter:drop-shadow(1px 2px 0 rgba(255,255,255,.42))
}
.cell.bad{outline:4px solid var(--bad);z-index:1}
.cell.winQueen::after{
  animation:queenPulse .55s ease-in-out infinite alternate;color:#7b1fa2;font-size:1.75em
}
@keyframes queenPulse{
  from{transform:scale(1);filter:drop-shadow(0 0 0 var(--win))}
  to{transform:scale(1.35);filter:drop-shadow(0 0 10px var(--win))}
}
.rules{
  margin-top:14px;background:rgba(255,255,255,.09);padding:13px 15px;
  border-radius:16px;line-height:1.45
}
.rules strong{color:var(--panel)}
</style>
</head>
<body>
<main class="app">
<header>
  <h1>Retro Queens</h1>
  <p class="subtitle">Curated puzzles: tap once for X, twice for queen.</p>
</header>

<section class="controls">
  <select id="difficulty">
    <option value="easy">Easy 6 × 6</option>
    <option value="medium" selected>Medium 8 × 8</option>
    <option value="hard">Hard 10 × 10</option>
  </select>
  <button id="newGame">New game</button>
  <button id="undo">Undo</button>
  <button id="check">Check</button>
  <button id="clear">Clear marks</button>
</section>

<div id="status">Loading puzzle…</div>
<section class="board-wrap"><div id="board"></div></section>

<section class="rules">
  <strong>Rules:</strong> one queen in every row, every column and every colour region.
  Queens must not touch, including diagonally. They do not attack along full diagonals.
</section>
</main>

<script>
const palettes=[
  "#f8dc83","#f5b47b","#8fd3d0","#eba1b6","#bad496",
  "#c6a7e8","#f3a895","#98c5df","#e5cf88","#b7d9a9"
];

const PUZZLES={
  easy:[{
    size:6,
    message:"Curated easy puzzle ready — no single-square colour regions.",
    solution:[[0,5],[1,1],[2,4],[3,2],[4,0],[5,3]],
    zones:[
      [1,1,1,3,2,0],
      [1,1,1,3,2,0],
      [1,4,3,3,2,2],
      [4,4,3,3,3,2],
      [4,4,5,3,5,2],
      [4,4,5,5,5,2]
    ]
  }],
  medium:[{
    size:8,
    message:"Curated medium puzzle ready — unique solution.",
    solution:[[0,1],[1,3],[2,0],[3,2],[4,6],[5,4],[6,7],[7,5]],
    zones:[
      [2,0,0,1,3,3,3,4],
      [2,2,2,1,3,3,3,4],
      [2,2,2,3,3,3,3,4],
      [2,2,3,3,3,3,3,4],
      [2,2,2,3,5,4,4,4],
      [2,2,2,5,5,4,4,4],
      [2,5,5,5,5,7,6,6],
      [5,5,5,5,5,7,6,6]
    ]
  }],
  hard:[{
    size:10,
    message:"Curated hard puzzle ready — unique solution, deeper deductions.",
    solution:[[0,1],[1,6],[2,4],[3,2],[4,8],[5,3],[6,7],[7,5],[8,0],[9,9]],
    zones:[
      [8,0,3,3,3,3,3,1,1,9],
      [8,0,3,3,2,2,1,1,1,9],
      [8,3,3,3,2,2,6,6,4,9],
      [8,3,3,3,3,7,6,6,4,9],
      [8,3,3,5,7,7,7,6,4,9],
      [8,5,5,5,7,7,7,6,6,9],
      [8,5,7,7,7,7,7,6,6,9],
      [7,7,7,7,7,7,7,7,7,9],
      [8,8,8,8,8,9,9,9,9,7],
      [7,8,8,8,8,9,9,9,9,9]
    ]
  }]
};

let size=8,zones=[],solution=[],marks=new Map(),history=[],won=false,puzzleIndex={easy:0,medium:0,hard:0};
const board=document.getElementById("board");
const status=document.getElementById("status");
const difficulty=document.getElementById("difficulty");

const key=(r,c)=>`${r},${c}`;
const mark=(r,c)=>marks.get(key(r,c))||0;

function cloneGrid(grid){return grid.map(row=>row.slice())}
function cloneSol(sol){return sol.map(([r,c])=>[r,c])}

function transformCoord(r,c,n,t){
  if(t===0)return [r,c];
  if(t===1)return [c,n-1-r];
  if(t===2)return [n-1-r,n-1-c];
  if(t===3)return [n-1-c,r];
  if(t===4)return [r,n-1-c];
  if(t===5)return [n-1-r,c];
  return [r,c];
}

function transformPuzzle(p){
  const n=p.size;
  const t=Math.floor(Math.random()*6);
  let newZones=Array.from({length:n},()=>Array(n).fill(0));
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      const [nr,nc]=transformCoord(r,c,n,t);
      newZones[nr][nc]=p.zones[r][c];
    }
  }
  let newSol=p.solution.map(([r,c])=>transformCoord(r,c,n,t));

  // Randomise colour-region IDs so the same curated puzzle looks less repetitive.
  const perm=[...Array(n).keys()];
  for(let i=perm.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [perm[i],perm[j]]=[perm[j],perm[i]];
  }
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++) newZones[r][c]=perm[newZones[r][c]];
  }
  return {size:n,zones:newZones,solution:newSol,message:p.message};
}

function queens(){
  return [...marks.entries()]
    .filter(([,v])=>v===2)
    .map(([k])=>k.split(",").map(Number));
}

function autoX(){
  const a=new Set();
  for(const [r,c] of queens()){
    for(let i=0;i<size;i++){
      if(i!==c)a.add(key(r,i));
      if(i!==r)a.add(key(i,c));
    }
    for(let rr=0;rr<size;rr++){
      for(let cc=0;cc<size;cc++){
        if(!(rr===r&&cc===c)&&zones[rr][cc]===zones[r][c])a.add(key(rr,cc));
      }
    }
    for(let dr=-1;dr<=1;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(dr||dc){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<size&&nc>=0&&nc<size)a.add(key(nr,nc));
        }
      }
    }
  }
  for(const [r,c] of queens())a.delete(key(r,c));
  return a;
}

function conflicts(){
  const q=queens(),bad=new Set();

  function checkGroup(labelFn){
    const map=new Map();
    q.forEach(([r,c])=>{
      const label=labelFn(r,c);
      if(!map.has(label))map.set(label,[]);
      map.get(label).push([r,c]);
    });
    for(const group of map.values()){
      if(group.length>1)group.forEach(([r,c])=>bad.add(key(r,c)));
    }
  }

  checkGroup((r,c)=>r);
  checkGroup((r,c)=>c);
  checkGroup((r,c)=>zones[r][c]);

  for(let i=0;i<q.length;i++){
    for(let j=i+1;j<q.length;j++){
      const [r1,c1]=q[i],[r2,c2]=q[j];
      if(Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1){
        bad.add(key(r1,c1));bad.add(key(r2,c2));
      }
    }
  }
  return bad;
}

function isSolved(){
  const q=queens();
  if(conflicts().size||q.length!==size)return false;
  return new Set(q.map(([r])=>r)).size===size &&
         new Set(q.map(([,c])=>c)).size===size &&
         new Set(q.map(([r,c])=>zones[r][c])).size===size;
}

function pushHistory(){
  history.push(new Map(marks));
  if(history.length>100)history.shift();
}

function render(){
  const ax=autoX(),bad=conflicts();
  board.innerHTML="";
  board.style.gridTemplateColumns=`repeat(${size},1fr)`;

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const cell=document.createElement("button");
      const k=key(r,c),m=mark(r,c);
      cell.className="cell";
      cell.style.background=palettes[zones[r][c]%palettes.length];

      if(m===2)cell.classList.add("queen");
      else if(m===1)cell.classList.add("x");
      else if(ax.has(k))cell.classList.add("auto-x");

      if(bad.has(k))cell.classList.add("bad");
      if(won&&m===2)cell.classList.add("winQueen");

      cell.onclick=()=>{
        if(won)return;
        pushHistory();
        const current=mark(r,c);
        const next=current===0?1:current===1?2:0;
        if(next===0)marks.delete(k);
        else marks.set(k,next);
        render();
        updateStatus();
      };

      board.appendChild(cell);
    }
  }
}

function updateStatus(){
  if(isSolved()){
    won=true;
    status.textContent="Groovy! Puzzle solved.";
    render();
    return;
  }
  const bad=conflicts();
  const q=queens().length;
  status.textContent=bad.size ? "There is a queen clash." : `${q}/${size} queens placed.`;
}

function loadPuzzle(){
  const level=difficulty.value;
  const list=PUZZLES[level];
  const base=list[puzzleIndex[level]%list.length];
  puzzleIndex[level]++;
  const p=transformPuzzle(base);

  size=p.size;
  zones=p.zones;
  solution=p.solution;
  marks.clear();
  history=[];
  won=false;
  render();
  status.textContent=p.message;
}

function checkWin(){
  if(isSolved()){
    won=true;
    status.textContent="Groovy! Puzzle solved.";
    render();
    return;
  }
  const bad=conflicts();
  if(bad.size)status.textContent="Not quite — at least one queen clashes.";
  else status.textContent=`You need ${size} queens.`;
}

document.getElementById("newGame").onclick=loadPuzzle;
document.getElementById("undo").onclick=()=>{
  if(history.length){
    marks=history.pop();
    won=false;
    render();
    updateStatus();
  }else{
    status.textContent="Nothing to undo.";
  }
};
document.getElementById("clear").onclick=()=>{
  pushHistory();
  marks.clear();
  won=false;
  render();
  status.textContent="Board cleared.";
};
document.getElementById("check").onclick=checkWin;
difficulty.onchange=loadPuzzle;

loadPuzzle();
</script>
</body>
</html>
